{% extends 'base.html' %}
{% block content %}
<div class="flex min-h-[80vh] items-center justify-center px-4">
    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-100 text-center">
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
            <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-extrabold text-gray-900 mb-4">Password reset complete</h2>
        <p class="text-gray-600 mb-6">Your password has been set. You may go ahead and log in now.</p>
        <a href="{% url 'login' %}" class="inline-block w-full bg-[#1E3A8A] text-white font-bold py-3 rounded-md hover:bg-blue-800 transition">Log in</a>
    </div>
</div>
{% endblock %}
