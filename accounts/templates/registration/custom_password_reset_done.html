{% extends 'base.html' %}
{% block content %}
<div class="flex min-h-[80vh] items-center justify-center px-4">
    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-100 text-center">
        <h2 class="text-2xl font-extrabold text-gray-900 mb-4">Check your inbox</h2>
        <p class="text-gray-600 mb-6">We have emailed you instructions for setting your password, if an account exists with the email you entered.</p>
        <a href="{% url 'login' %}" class="text-[#10B981] font-bold hover:underline">Return to login</a>
    </div>
</div>
{% endblock %}
