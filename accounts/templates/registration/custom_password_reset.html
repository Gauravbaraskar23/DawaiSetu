{% extends 'base.html' %}
{% block content %}
<style>
    .django-form-wrapper input {
        width: 100%; padding: 0.625rem 0.75rem; margin-top: 0.25rem;
        border: 1px solid #D1D5DB; border-radius: 0.375rem; font-size: 0.875rem;
    }
    .django-form-wrapper input:focus { outline: none; border-color: #1E3A8A; box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.2); }
</style>
<div class="flex min-h-[80vh] items-center justify-center px-4">
    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <h2 class="text-2xl font-extrabold text-gray-900 text-center mb-2">Reset Password</h2>
        <p class="text-sm text-gray-600 text-center mb-6">Enter your email address and we will send you a link to reset your password.</p>
        <form method="POST" class="django-form-wrapper">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                        <p class="text-red-600 text-sm mt-1">{{ error }}</p>
                    {% endfor %}
                </div>
            {% endfor %}
            <button type="submit" class="w-full bg-[#1E3A8A] text-white font-bold py-3 rounded-md hover:bg-blue-800 transition">Send Reset Link</button>
        </form>
    </div>
</div>
{% endblock %}
