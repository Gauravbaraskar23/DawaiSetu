{% extends 'base.html' %}

{% block title %}Add Medicine | Meditrack{% endblock %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">

<style>
    .django-form-wrapper input, .django-form-wrapper select, .django-form-wrapper textarea {
        width: 100%; padding: 0.625rem 0.75rem; margin-top: 0.25rem;
        border: 1px solid #D1D5DB; border-radius: 0.375rem; font-size: 0.875rem;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    .django-form-wrapper input:focus, .django-form-wrapper select:focus, .django-form-wrapper textarea:focus {
        outline: none; border-color: #1E3A8A; box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.2);
    }

    /* Tweaking Tom Select to blend with your Tailwind theme */
    .ts-control {
        padding: 0.625rem 0.75rem !important;
        border: 1px solid #D1D5DB !important;
        border-radius: 0.375rem !important;
        box-shadow: none !important;
        font-size: 0.875rem !important;
    }
    .ts-control.focus {
        border-color: #1E3A8A !important;
        box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.2) !important;
    }
</style>

<div class="max-w-3xl mx-auto py-8">
    <div class="mb-6">
        <a href="{% url 'seller_dashboard' %}" class="text-sm font-semibold text-[#1E3A8A] hover:underline">&larr; Back to Dashboard</a>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <h2 class="text-2xl font-extrabold text-gray-900 mb-6">Add New Medicine</h2>
        
        <form method="POST" enctype="multipart/form-data" class="django-form-wrapper space-y-5">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                {% for field in form %}
                    <div class="{% if field.name == 'description' %}col-span-full{% endif %}">
                        <label class="block text-sm font-bold text-gray-700 mb-1">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <p class="text-red-500 text-xs mt-1 font-semibold">{{ field.errors.0 }}</p>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>

            <div class="pt-6 border-t border-gray-100 mt-8">
                <button type="submit" class="w-full md:w-auto bg-[#1E3A8A] text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-800 transition">
                    Save Medicine
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Django auto-generates IDs for form fields like this: id_fieldname
        const fields = ['#id_subcategory', '#id_manufacturer', '#id_molecule'];
        
        fields.forEach(function(fieldId) {
            if (document.querySelector(fieldId)) {
                new TomSelect(fieldId, {
                    create: true, // This allows the user to type a brand new entry!
                    sortField: { field: "text", direction: "asc" },
                    placeholder: "Search or type to create new..."
                });
            }
        });

        // 2. The Seller field: Can search fast, but CANNOT create new users here
        if (document.querySelector('#id_seller')) {
            new TomSelect('#id_seller', {
                create: false, // Prevents typing random names that would crash the DB
                sortField: { field: "text", direction: "asc" },
                placeholder: "Search for registered agency..."
            });
        }
    });
</script>
{% endblock %}
